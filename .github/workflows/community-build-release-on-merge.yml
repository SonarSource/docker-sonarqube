name: Community Build Release on Merge

on:
  pull_request:
    types: [closed]
    branches: [master]

jobs:
  create-release:
    name: Create GitHub release for merged community-build bump
    runs-on: github-ubuntu-latest-s
    concurrency:
      group: community-build-release-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    if: >
      github.repository == 'SonarSource/docker-sonarqube' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'task/REL-') &&
      contains(github.event.pull_request.head.ref, '-bump-community-build-version-') &&
      contains(github.event.pull_request.labels.*.name, 'community-build-release')
    permissions:
      contents: write
    steps:
      - name: 'Checkout merge commit'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v6.0.2
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          persist-credentials: false

      - name: 'Derive and validate version and jira key'
        id: version
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          BRANCH_RE='^task/(REL-[0-9]+)-bump-community-build-version-([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+)$'

          if ! echo "$HEAD_REF" | grep -qE "$BRANCH_RE"; then
            echo "Error: branch '${HEAD_REF}' does not match task/<JIRA_KEY>-bump-community-build-version-<VERSION>"
            exit 1
          fi

          JIRA_KEY=$(echo "$HEAD_REF" | sed -E "s|${BRANCH_RE}|\1|")
          VERSION=$(echo "$HEAD_REF" | sed -E "s|${BRANCH_RE}|\2|")

          FILE_VERSION=$(grep -E '^  community_build: ".*"$' .github/github_env.yaml | sed -E 's/^  community_build: "(.*)"$/\1/')
          if [ "$VERSION" != "$FILE_VERSION" ]; then
            echo "Error: branch version '${VERSION}' does not match community_build '${FILE_VERSION}' in .github/github_env.yaml"
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "jira_key=${JIRA_KEY}" >> "$GITHUB_OUTPUT"

      - name: 'Create GitHub release'
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release ${VERSION} already exists. Skipping creation."
            exit 0
          fi

          gh release create "$VERSION" \
            --target "$MERGE_SHA" \
            --title "SonarQube Community Build ${VERSION}"

      - name: 'Dispatch Community Build release on helm-chart-sonarqube'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          JIRA_KEY: ${{ steps.version.outputs.jira_key }}
        run: |
          gh workflow run community-build-release.yml \
            --repo SonarSource/helm-chart-sonarqube \
            --field community_build_number="$VERSION" \
            --field jira_key="$JIRA_KEY"
